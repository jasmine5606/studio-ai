name: Build & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: studio_ai_test
          POSTGRES_USER: studio_ai
          POSTGRES_PASSWORD: studio_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('pom.xml') }}
          restore-keys: maven-

      - name: Build with Maven
        run: mvn -B package -DskipTests
        env:
          DB_URL: jdbc:postgresql://localhost:5432/studio_ai_test
          DB_USERNAME: studio_ai
          DB_PASSWORD: studio_ai
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Run tests
        run: mvn -B test

      - name: Build Docker image
        if: github.event_name == 'push'
        run: docker build -t studio-ai:${{ github.sha }} .

      - name: Save Docker image
        if: github.event_name == 'push'
        run: docker save studio-ai:${{ github.sha }} | gzip > studio-ai.tar.gz

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: studio-ai.tar.gz

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < studio-ai.tar.gz

      - name: Deploy to server
        run: |
          echo "Deployment would happen here"
          echo "Configure SSH keys and server details in repository secrets"
