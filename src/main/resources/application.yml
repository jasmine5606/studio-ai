server:
  port: ${SERVER_PORT:8090}
  address: ${SERVER_ADDRESS:0.0.0.0}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:file:./application-secrets.yml
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:50MB}
      max-request-size: ${MAX_REQUEST_SIZE:50MB}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# Actuator & Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: studio-ai
  tracing:
    sampling:
      probability: 1.0

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  show-actuator: true

# JWT
jwt:
  enabled: ${JWT_ENABLED:false}
  secret: ${JWT_SECRET:studio-ai-default-secret-key-change-in-production}
  expiration-ms: ${JWT_EXPIRATION:86400000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}

# Rate Limiting
rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  requests-per-minute: ${RATE_LIMIT_RPM:60}
  burst-capacity: ${RATE_LIMIT_BURST:100}

langchain4j:
  community:
    dashscope:
      embedding-model:
        api-key: ${DASHSCOPE_API_KEY:}
        model-name: text-embedding-v3

dashscope:
  asr:
    api-key: ${DASHSCOPE_ASR_API_KEY:}

pinecone:
  api-key: ${PINECONE_API_KEY:}
  index-name: ${PINECONE_INDEX_NAME:studio-ai-center}
  dimension: ${PINECONE_DIMENSION:1024}

github:
  token: ${GITHUB_TOKEN:}
  default-owner: ${GITHUB_DEFAULT_OWNER:jasmine5606}
  default-repo: ${GITHUB_DEFAULT_REPO:jasmine}

mcp:
  enabled: ${MCP_ENABLED:false}

kb:
  storage-dir: ${KB_STORAGE_DIR:./knowledge-base/uploads}
  search:
    vector-min-score: ${KB_VECTOR_MIN_SCORE:0.25}
    hybrid-min-score: ${KB_HYBRID_MIN_SCORE:0.18}

bilibili:
  api:
    base-url: ${BILIBILI_API_BASE_URL:https://api.bilibili.com}

auth:
  enabled: ${AUTH_ENABLED:true}
  token-ttl-hours: ${AUTH_TOKEN_TTL_HOURS:168}
