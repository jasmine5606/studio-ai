# 开发环境配置 - 使用 H2 内存数据库，无需外部依赖
spring:
  datasource:
    url: jdbc:h2:file:./data/studio-ai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console

# Dev: auth enabled with default users
auth:
  enabled: true
  users:
    - username: admin
      password: admin123
      role: ADMIN
    - username: dev
      password: dev123
      role: USER

# Dev: disable rate limiting
rate-limit:
  enabled: false

logging:
  level:
    com.jasmine.studioai: DEBUG
